<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages serves this file for unknown routes.
      // Redirect unknown paths to HashRouter format: /#/...
      const segmentCount = 1; // repo name segment: /magazin-kosmetic
      const { protocol, hostname, port, pathname, search, hash } = window.location;
      const origin = `${protocol}//${hostname}${port ? `:${port}` : ""}`;
      const parts = pathname.replace(/^\/+/, "").split("/");
      const repo = parts.slice(0, segmentCount).join("/");
      const route = parts.slice(segmentCount).join("/");
      const query = search || "";
      const hashPart = hash || "";
      const target = route ? `#/${route}${query}${hashPart}` : `#/${query}${hashPart}`;
      window.location.replace(`${origin}/${repo}/${target}`);
    </script>
  </head>
  <body></body>
</html>
