<!DOCTYPE html>
<html lang="ru-KZ" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLuxe — интернет-магазин косметики (₸)</title>
    <meta
      name="description"
      content="Каталог косметики, корзина, оформление заказа в тенге (KZT), управление заказами. Дипломный проект."
    />
  </head>
  <body class="min-h-screen bg-[#faf7fc] text-stone-900 antialiased">
    <div id="root"></div>
    <script>
      // GitHub Pages SPA fallback: restore original route after 404 redirect.
      (function (location) {
        if (location.search.startsWith("?/")) {
          const route = location.search
            .slice(2)
            .replace(/~and~/g, "&");
          const cleanPath = location.pathname.replace(/\/$/, "");
          const nextUrl = `${cleanPath}/${route}${location.hash}`;
          window.history.replaceState(null, "", nextUrl);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
